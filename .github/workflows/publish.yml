# Publishes this n8n community node package to npm on every version tag push.
#
# Starting May 1 2026, n8n requires all community nodes submitted for
# verification to be published via GitHub Actions with npm provenance
# statements. This workflow satisfies that requirement. Provenance lets
# anyone cryptographically verify that a package was built by this exact
# workflow, from this exact repository and commit.
#
# ─── PREREQUISITES ─────────────────────────────────────────────────────────────
#
# - Public GitHub repo (provenance attestations require a public source).
# - Scoped public npm package: `publishConfig.access: "public"` is set in
#   package.json.
# - @n8n/node-cli ≥ 0.23.0 (we use the @n8n/node-cli release script).
#
# ─── ONE-TIME SETUP ────────────────────────────────────────────────────────────
#
# Option A — OIDC Trusted Publishing (recommended, no long-lived secrets):
#   1. Log in to npmjs.com and open your package's settings.
#   2. Under "Publish access" → "Trusted Publishers", click "Add a publisher".
#   3. Select GitHub Actions and fill in:
#        Repository owner: dankelleher
#        Repository name:  n8n-nodes-anthropic-structured
#        Workflow name:    publish.yml
#        Environment:      (leave blank unless using GitHub Environments)
#   4. Leave the NPM_TOKEN secret unset in this repository. GitHub's OIDC
#      token is used instead — no long-lived secret in repo settings.
#
# Option B — npm Automation Token (fallback):
#   1. On npmjs.com: Access Tokens → Generate New Token → Granular Access Token.
#      Scope it to this package with "Read and write" publish permission.
#   2. In GitHub: Settings → Secrets and variables → Actions → New secret.
#      Name it NPM_TOKEN and paste the token value.
#
# Both options work with --provenance. Provenance is signed by GitHub's OIDC
# infrastructure regardless of how npm authentication is handled.
#
# ─── TAG CONVENTION ────────────────────────────────────────────────────────────
#
# Triggers on tags matching "*.*.*" (e.g. 0.2.0). Switch to "v*.*.*" if you
# prefer a "v" prefix.
#
# ─── RELEASE PROCESS ───────────────────────────────────────────────────────────
#
# Locally:
#
#   pnpm release
#
# Lints, tests, builds, prompts for a version bump, updates the changelog,
# commits, tags, and pushes — which triggers this workflow to publish to npm.

name: Publish

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      # Required to mint an OIDC token for npm provenance attestation.
      id-token: write
      # Scoped down from the default (write) for least-privilege publishing.
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Release
        # Publishes to npm with a provenance attestation (requires
        # `id-token: write` above and `publishConfig.provenance: true` in
        # package.json).
        #
        # Option A (OIDC): leave NPM_TOKEN unset — npm uses the OIDC exchange.
        # Option B (token): set NPM_TOKEN in repo secrets and it's written to
        #   .npmrc here before publishing.
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          fi
          pnpm release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
